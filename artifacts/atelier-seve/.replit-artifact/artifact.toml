kind = "web"
previewPath = "/"
title = "Atelier Sève"
version = "1.0.0"
id = "artifacts/atelier-seve"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20930

[services.development]
run = "pnpm --filter @workspace/atelier-seve run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/atelier-seve", "run", "build" ]
publicDir = "artifacts/atelier-seve/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20930"
BASE_PATH = "/"
