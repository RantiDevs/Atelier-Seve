openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Atelier Sève API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: chat
    description: AI chat operations
  - name: intake
    description: New client intake
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /chat:
    post:
      operationId: sendChat
      tags: [chat]
      summary: Send a message to the AI beauty consultant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatInput"
      responses:
        "200":
          description: AI response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /intake:
    post:
      operationId: submitIntake
      tags: [intake]
      summary: Submit new client intake form
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IntakeInput"
      responses:
        "201":
          description: Intake submitted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntakeResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ChatMessage:
      type: object
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
      required:
        - role
        - content

    ChatInput:
      type: object
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
      required:
        - messages

    ChatResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    IntakeInput:
      type: object
      properties:
        nomeCompleto:
          type: string
        email:
          type: string
          format: email
        telefono:
          type: string
        dataNascita:
          type: string
        tipoPelle:
          type: string
          enum: [Normale, Grassa, Secca, Mista, Sensibile]
        trattamento:
          type: string
          enum: [Viso, Ciglia, Corpo, Epilazione, Labbra]
        noteAggiuntive:
          type: ["string", "null"]
      required:
        - nomeCompleto
        - email
        - telefono
        - dataNascita
        - tipoPelle
        - trattamento

    IntakeResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success
        - message

    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
